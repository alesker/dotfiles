config-version = 2
start-at-login = true
after-startup-command = [
  "layout --workspace 2 --root h_tiles",
  "layout --workspace 3 --root h_accordion",
  "layout --workspace 4 --root h_accordion",
]
default-root-container-layout = "tiles"
default-root-container-orientation = "auto"
accordion-padding = 32
enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true
automatically-unhide-macos-hidden-apps = false
on-focused-monitor-changed = ["move-mouse monitor-lazy-center"]
on-mode-changed = []
persistent-workspaces = [
  "1",  # regular macOS "everything floats" workspace
  "2",  # focused-work workspace for code and terminal
  "3",  # focused-work workspace for research and comms
  "4",  # media workspace
]

[workspace-to-monitor-force-assignment]
1 = "main"
2 = "main"
3 = "main"
4 = "main"
5 = "secondary"

[key-mapping]
preset = "qwerty"

[gaps]
inner.horizontal = 4
inner.vertical = 4
outer.left = 0
outer.bottom = 0
outer.top = 0
outer.right = 0

[mode.main.binding]
alt-1 = "workspace 1"
alt-2 = "workspace 2"
alt-3 = "workspace 3"
alt-4 = "workspace 4"
alt-sectionSign = "workspace 5"
alt-shift-1 = ["layout floating", "move-node-to-workspace 1"]
alt-shift-2 = ["layout tiling", "move-node-to-workspace 2"]
alt-shift-3 = ["layout tiling", "move-node-to-workspace 3"]
alt-shift-4 = ["layout tiling", "move-node-to-workspace 4"]
alt-shift-sectionSign = ["layout tiling", "move-node-to-workspace 5"]
alt-h = "focus left"
alt-j = "focus down"
alt-k = "focus up"
alt-l = "focus right"
alt-shift-h = "move left"
alt-shift-j = "move down"
alt-shift-k = "move up"
alt-shift-l = "move right"
alt-enter = "fullscreen"
alt-f = "layout floating tiling"
alt-slash = "layout tiles horizontal vertical"
alt-comma = "layout accordion horizontal vertical"
alt-minus = "resize smart -50"
alt-equal = "resize smart +50"
alt-0 = "balance-sizes"
alt-shift-semicolon = "mode service"
alt-tab = "exec-and-forget ~/.config/aerospace/cycle-window next"
alt-shift-tab = "exec-and-forget ~/.config/aerospace/cycle-window prev"

[mode.service.binding]
esc = "mode main"
r = ["reload-config", "mode main"]
f = "flatten-workspace-tree"
h = "join-with left"
j = "join-with down"
k = "join-with up"
l = "join-with right"

# Float windows on the first workspace
[[on-window-detected]]
if.workspace = "1"
check-further-callbacks = true
run = "layout floating"

# Float these windows everywhere
[[on-window-detected]]
check-further-callbacks = true
if = """
test %{app-bundle-id} = com.apple.systempreferences || \
test %{app-bundle-id} = com.apple.finder || \
test %{app-bundle-id} = com.culturedcode.ThingsMac || \
test %{app-bundle-id} = com.1password.1password
"""
run = ["layout floating"]

# Pin these apps to workspace 1
[[on-window-detected]]
check-further-callbacks = true
if = """
test %{app-bundle-id} = com.apple.iCal || \
test %{app-bundle-id} = ru.keepcoder.Telegram
"""
run = ["layout floating", "move-node-to-workspace 1"]

# Pin these apps to workspace 2
[[on-window-detected]]
check-further-callbacks = true
if = """
test %{app-bundle-id} = com.apple.dt.Xcode
"""
run = ["layout tiling", "move-node-to-workspace 2"]

# Float and expand Ghostty and Fork on this workspace as they use macOS native tabs, which confuses tiling
[[on-window-detected]]
check-further-callbacks = true
if = """
test %{app-bundle-id} = com.mitchellh.ghostty || \
test %{app-bundle-id} = com.DanPristupov.Fork
"""
run = ["layout floating", "fullscreen", "move-node-to-workspace 2"]

# Pin these apps to workspace 3
[[on-window-detected]]
check-further-callbacks = true
if = """
(test %{app-bundle-id} = com.apple.Safari && test %{window-title} ~= "^🕳️ .* — ") || \
test %{app-bundle-id} = com.readdle.SparkDesktop.appstore || \
test %{app-bundle-id} = com.tinyspeck.slackmacgap || \
test %{app-bundle-id} = com.microsoft.Outlook
"""
run = ["layout tiling", "move-node-to-workspace 3"]

# Pin these apps to workspace 4
[[on-window-detected]]
check-further-callbacks = true
if = """
test %{app-bundle-id} = com.spotify.client
"""
run = ["layout tiling", "move-node-to-workspace 4"]
