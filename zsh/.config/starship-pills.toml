"$schema" = "https://starship.rs/config-schema.json"

format = """
[в•ӯ](fg:default)\
$directory\
$git_branch\
$git_status\
$cmd_duration\
$line_break\
[в•°](fg:default)\
$character\
"""

palette = "default"

[palettes.default]
default = "#928374"
tag = "#ebdbb2"
dir = "cyan"
git = "purple"
cmd = "yellow"

[character]
success_symbol = "[п‘ ](bold green)"
error_symbol = "[п‘ ](bold red)"

[directory]
truncation_length = 1
read_only = " п‘–"
style = "bold bg:default"
format = "[оӮ¶](fg:dir)[пҗ“ ](fg:tag bg:dir)[оӮҙ](fg:dir bg:default)[ $path ]($style)[оӮҙ](fg:default)"

[git_branch]
style = "bold bg:default"
format = "[в”Җ](fg:default)[оӮ¶](fg:git)[пҗҳ ](fg:tag bg:git)[оӮҙ](fg:git bg:default)[ $branch]($style)[оӮҙ](fg:default bg:git)"

[git_status]
style = "bold fg:tag bg:git"
format = "[$all_status$ahead_behind]($style)[оӮҙ](fg:git)"

[cmd_duration]
style = "bold bg:default"
format = "[в”Җ](fg:default)[оӮ¶](fg:cmd)[п“Ә ](fg:tag bg:cmd)[оӮҙ](fg:cmd bg:default)[ $duration ]($style)[оӮҙ](fg:default)"

[fill]
symbol = "в”Җ"
style = "bold bg:default"
