"$schema" = 'https://starship.rs/config-schema.json'

format = """
$character\
$directory\
$git_branch\
$git_status\
$cmd_duration\
"""

add_newline = false

[character]
success_symbol = "[➜](bold green) "
error_symbol = "[➜](bold red) "

[directory]
truncation_length = 1
read_only = " "
format = "[$path ]($style)"

[git_branch]
symbol = ""
format = "[$symbol $branch ]($style)"

[git_status]
format = "[($all_status$ahead_behind )]($style)"

[cmd_duration]
format = "[$duration ]($style)"
