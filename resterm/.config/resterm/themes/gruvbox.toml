[metadata]
name = "Gruvbox"
description = "Gruvbox ANSI theme first pass using only black and white for contrast review"
author = "Alesker"
version = "1.0.0"
tags = ["gruvbox", "ansi", "contrast"]

# Use quoted ANSI color indexes so Resterm treats them as Lip Gloss colors.
# -  0 black, 1 red, 2 green, 3 yellow, 4 blue, 5 magenta, 6 cyan, 7 white
# -  8 bright_black, 9 bright_red, 10 bright_green, 11 bright_yellow
# - 12 bright_blue, 13 bright_magenta, 14 bright_cyan, 15 bright_white

# First pass intentionally uses only 0 and 7 to verify contrast before adding color.

